# config/macropad.conf — production config with battery support

# Core ZMK features
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_BT_BAS=y

# Idle / Sleep behavior
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display chain
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_SSD1322=n
CONFIG_SSD1322_PATCHED=y

# LVGL config
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_USE_THEME_MONO=y
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_Z_DOUBLE_VDB=n
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Init priority ordering for display chain
CONFIG_SPI_INIT_PRIORITY=55
CONFIG_MIPI_DBI_INIT_PRIORITY=60
CONFIG_DISPLAY_INIT_PRIORITY=70

# Dedicated display thread (keeps key scanning responsive)
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=16384

# Stack headroom
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Safety
CONFIG_HW_STACK_PROTECTION=y
CONFIG_MPU_STACK_GUARD=y