# config/macropad.conf

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# Core display support
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y

# Select the built‑in status screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y


# SPI + MIPI DBI + SSD1322 driver
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_SSD1322=y

CONFIG_SPI_DEVICE=y

CONFIG_ASSERT=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=4

# keep key scanning responsive while display debugging
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=6144

# stack/heap headroom during LVGL + display init
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y

# RTT logs for early-boot failures (when USB logging dies)
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
