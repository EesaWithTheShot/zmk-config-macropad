# config/macropad.conf

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# Core display support
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y

# Select the built‑in status screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y


# SPI + MIPI DBI + SSD1322 driver
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
# Use the patched driver instead of upstream
CONFIG_SSD1322=n
CONFIG_SSD1322_PATCHED=y
CONFIG_SSD1322_DEFAULT_GRAYSCALE=y

# Init priority: guarantee SPI → MIPI DBI → SSD1322 order
CONFIG_SPI_INIT_PRIORITY=55
CONFIG_MIPI_DBI_INIT_PRIORITY=60
CONFIG_DISPLAY_INIT_PRIORITY=70
CONFIG_ASSERT=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
# Temporarily disabled — MPU stack guard converts overflow to reboot loop,
# masking the real crash cause during debugging
CONFIG_HW_STACK_PROTECTION=y
CONFIG_MPU_STACK_GUARD=y

CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_Z_DOUBLE_VDB=n
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000

CONFIG_BOOT_DELAY=2000
# CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_COLOR_DEPTH_8=y

CONFIG_DISPLAY_LOG_LEVEL_DBG=y
